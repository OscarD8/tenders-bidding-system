{% load static %}
<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Bamboo Tenders{% endblock %}</title>
    <link href="{% static 'css/dist/style.css' %}" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="{% static 'js/navbar.js' %}" defer></script>
</head>
<body class="bg-stone-900 text-stone-100 font-sans antialiased overflow-hidden">

    <!-- Navigation -->
    {% include "components/navbar.html" %}

    <!-- Main Content -->
    <main class="relative w-full h-screen overflow-hidden">
        {% block content %}
        {% endblock %}
    </main>

    <!-- Footer (Absolute bottom if needed, or part of the flow) -->
    <footer class="fixed bottom-0 w-full bg-stone-900/90 backdrop-blur text-stone-400 py-4 border-t border-white/10 z-40 pointer-events-none">
        <div class="max-w-screen-xl mx-auto text-center text-xs">
            <p>&copy; 2023 Bamboo Tenders. Sustainable Decentralized Procurement.</p>
        </div>
    </footer>

</body>
</html>
