{% load static %}
<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Bamboo Tenders{% endblock %}</title>
    <link href="{% static 'dist/css/styles.css' %}" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="{% static 'src/js/navbar.js' %}" defer></script>
</head>

<body class="bg-stone-900 text-stone-100 font-sans antialiased min-h-screen flex flex-col">
{% include "components/navbar.html" %}

<main class="w-full flex-grow bg-stone-900">
    {% block content %}
    {% endblock %}
</main>

{% block footer_layout %}
    {% include "components/footer.html" %}
{% endblock %}

{% block extra_js %}
{% endblock %}
</body>

</html>
