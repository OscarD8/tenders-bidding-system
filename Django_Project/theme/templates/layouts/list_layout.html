{% extends 'base.html' %}

{% block content %}
    <div class="w-full bg-stone-900 relative pt-24 pb-12 px-4 sm:px-8">

        <div class="relative z-10 max-w-7xl mx-auto">

            <!-- Header -->
            <div class="mb-12 border-b border-earth-50/10 pb-8">
                {% block page_header %}
                {% endblock %}
            </div>

            <div class="flex flex-col lg:flex-row gap-8">

                <aside class="w-full lg:w-1/4 shrink-0">
                    {% block layout_sidebar %}
                    {% endblock %}
                </aside>

                <!-- List Item Container - Expands to two columns on larger screens -->
                <div class="w-full lg:w-3/4">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        {% block list_items %}
                        {% endblock %}
                    </div>
                </div>

            </div>
        </div>
    </div>
{% endblock %}
