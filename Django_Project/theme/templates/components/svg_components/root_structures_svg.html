<svg width="100%" height="100%" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">

    <style>
        /* The Data Flow Animation */
        @keyframes data-flow {
            to { stroke-dashoffset: -40; }
        }

        /* Sensor Pulse */
        @keyframes sensor-ping {
            0%, 100% { stroke-width: 1; opacity: 0.5; }
            50% { stroke-width: 3; opacity: 1; }
        }

        .data-line {
            stroke-dasharray: 10 30; /* Short dashes representing packets */
            animation: data-flow 1s linear infinite;
        }

        .sensor-node {
            transform-box: fill-box;
            transform-origin: center;
            animation: sensor-ping 2s ease-in-out infinite;
        }

        .delay-1 { animation-delay: 0.5s; }
        .delay-2 { animation-delay: 1.0s; }
    </style>

    <g stroke="#8b6446" stroke-width="1" opacity="0.3">
        <line x1="0" y1="100" x2="400" y2="100" stroke-width="2"></line>
        <line x1="100" y1="100" x2="100" y2="400" stroke-dasharray="4 4"></line>
        <line x1="200" y1="100" x2="200" y2="400" stroke-dasharray="4 4"></line>
        <line x1="300" y1="100" x2="300" y2="400" stroke-dasharray="4 4"></line>
    </g>

    <g stroke="#8b6446" stroke-width="4" fill="none" stroke-linecap="square">
        <path d="M200 40 V 200"></path>

        <path d="M200 140 H 120 V 250 H 80 V 320"></path>

        <path d="M200 180 H 320 V 280 H 350"></path>

        <path d="M200 200 L 240 240 V 350"></path>
    </g>

    <g stroke="#31c48d" stroke-width="2" fill="none" stroke-linecap="round">
        <path class="data-line" d="M200 40 V 200"></path>

        <path class="data-line" d="M200 140 H 120 V 250 H 80 V 320"></path>
        <path class="data-line" d="M200 180 H 320 V 280 H 350"></path>
        <path class="data-line" d="M200 200 L 240 240 V 350"></path>
    </g>

    <g fill="#0e9f6e" stroke="#31c48d">
        <rect x="70" y="320" width="20" height="20" rx="4" fill="#0e9f6e" stroke="none"></rect>
        <rect x="65" y="315" width="30" height="30" rx="8" fill="none" class="sensor-node"></rect>

        <rect x="350" y="270" width="20" height="20" rx="4" fill="#0e9f6e" stroke="none"></rect>
        <circle cx="360" cy="280" r="15" fill="none" class="sensor-node delay-1"></circle>

        <rect x="230" y="350" width="20" height="20" rx="4" fill="#0e9f6e" stroke="none"></rect>
        <rect x="225" y="345" width="30" height="30" rx="8" fill="none" class="sensor-node delay-2"></rect>
    </g>

    <circle cx="200" cy="40" r="8" fill="#a87e59" stroke="#8b6446" stroke-width="2"></circle>

</svg>
