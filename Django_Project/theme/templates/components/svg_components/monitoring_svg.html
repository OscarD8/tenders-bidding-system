<svg width="100%" height="100%" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"
     preserveAspectRatio="xMidYMid meet">

    <g transform="translate(100, 100)">
        <circle r="50" fill="#4d382e"></circle>

        <circle r="65" fill="#a87e59" opacity="0.3"></circle>

        <circle r="75" fill="none" stroke="#31c48d" stroke-width="2" opacity="0.6">
            <animate attributeName="opacity" values="0.6;0.8;0.6" dur="4s" repeatCount="indefinite"></animate>
        </circle>

        <circle r="90" fill="none" stroke="#c49d7b" stroke-width="1" stroke-dasharray="4,6" opacity="0.4"></circle>
    </g>

    <g>
        <g transform="translate(100, 100)">
            <circle r="55" fill="none" stroke="#0e9f6e" stroke-width="1.5" opacity="0">
                <animate attributeName="r" from="55" to="85" dur="3s" begin="0s" repeatCount="indefinite"></animate>
                <animate attributeName="opacity" values="0.8;0" dur="3s" begin="0s" repeatCount="indefinite"></animate>
            </circle>
            <circle r="55" fill="none" stroke="#0e9f6e" stroke-width="1.5" opacity="0">
                <animate attributeName="r" from="55" to="85" dur="3s" begin="1.5s" repeatCount="indefinite"></animate>
                <animate attributeName="opacity" values="0.8;0" dur="3s" begin="1.5s"
                         repeatCount="indefinite"></animate>
            </circle>
        </g>
    </g>
</svg>
