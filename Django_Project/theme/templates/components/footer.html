<footer class="w-full text-earth-100 py-1.5 md:py-3 mt-auto {{ extra_classes|default:'bg-stone-900 border-t border-white/10' }}">
    <div class="max-w-screen-xl mx-auto px-6 flex flex-col md:flex-row justify-between items-center text-xs">

        <div class="mb-4 md:mb-0">
            <p>&copy; {% now "Y" %} Bamboo Tenders</p>
            <p class= mt-1">Sustainable Decentralized Procurement.</p>
        </div>

        <div class="flex gap-6">
            {% with footer_link="hover:text-earth-400 transition-colors" %}
                <a href="#" class="{{ footer_link }}">Privacy Policy</a>
                <a href="#" class="{{ footer_link }}">Terms of Service</a>
                <a href="#" class="{{ footer_link }}">Accessibility</a>
            {% endwith %}
        </div>

    </div>
</footer>
