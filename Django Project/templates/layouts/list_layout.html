{% extends "base.html" %}

{% block content %}
    <section class="bg-white border-b border-slate-100 py-10 sm:py-16" aria-labelledby="page-heading">
        <div class="container mx-auto px-4 sm:px-6">
            <h1 id="page-heading" class="text-3xl sm:text-4xl font-extrabold text-slate-900 tracking-tight mb-3">
                {% block page_title %}List View{% endblock %}
            </h1>
            <p class="text-base sm:text-lg text-slate-500 max-w-2xl leading-relaxed">
                {% block page_subtitle %}Browse our records{% endblock %}
            </p>
        </div>
    </section>

    <div class="container mx-auto px-4 sm:px-6 py-8 sm:py-12">
        <div class="flex flex-col lg:flex-row gap-8 lg:gap-12">

            <aside class="w-full lg:w-1/4 flex-shrink-0">
                <div class="lg:sticky lg:top-24">

                    <details class="group bg-white p-0 lg:p-6 rounded-2xl lg:shadow-sm lg:border border-slate-100 overflow-hidden" open>
                        <summary class="list-none flex justify-between items-center cursor-pointer p-4 lg:p-0 bg-slate-50 lg:bg-transparent rounded-lg lg:rounded-none border lg:border-none border-slate-200">
                            <span class="font-bold text-slate-900 text-xs uppercase tracking-widest">Filter Results</span>
                            <span class="lg:hidden text-slate-500 group-open:rotate-180 transition-transform">▼</span>
                        </summary>

                        <div class="p-4 lg:p-0 border lg:border-none border-slate-200 lg:mt-6 border-t-0 rounded-b-lg lg:rounded-none bg-white">
                            <form method="get" role="search">
                                {% block filters %}
                                    <label for="search" class="sr-only">Search</label>
                                    <input type="text" id="search" name="q" placeholder="Keywords..." class="w-full bg-slate-50 border-slate-200 rounded-lg px-4 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none transition shadow-inner">
                                {% endblock %}
                                <button type="submit" class="w-full mt-4 bg-slate-900 text-white font-bold py-3 rounded-lg text-sm hover:bg-slate-800 transition shadow-lg shadow-slate-200/50 focus:ring-2 focus:ring-offset-2 focus:ring-slate-900">
                                    Apply Filters
                                </button>
                            </form>
                        </div>
                    </details>
                </div>
            </aside>

            <section class="w-full lg:w-3/4" aria-label="Results List">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    {% block list_items %}
                        {% endblock %}
                </div>

                <nav aria-label="Pagination" class="mt-12 pt-6 border-t border-slate-100 flex justify-center">
                    <span class="text-sm text-slate-400">Viewing Page 1 of 1</span>
                </nav>
            </section>
        </div>
    </div>
{% endblock %}
