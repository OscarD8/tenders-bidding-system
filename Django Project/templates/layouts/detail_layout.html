{% extends "base.html" %}

{% block content %}
    <div class="bg-slate-900 text-white py-16 lg:py-24 relative overflow-hidden">
        <div class="absolute top-0 right-0 w-1/2 h-full bg-gradient-to-l from-blue-900/50 to-transparent"></div>

        <div class="container mx-auto px-6 relative z-10">
            <div class="flex flex-col md:flex-row justify-between items-start gap-8">
                <div class="max-w-3xl">
                    <div class="flex items-center gap-3 mb-6 text-blue-200 text-sm font-medium">
                        {% block breadcrumbs %}
                            <span>Projects</span> <span>/</span> <span class="text-white">Detail</span>
                        {% endblock %}
                    </div>

                    <h1 class="text-4xl md:text-5xl lg:text-6xl font-extrabold tracking-tight mb-4">
                        {% block item_title %}{% endblock %}
                    </h1>

                    <p class="text-xl text-slate-400">
                        {% block item_subtitle %}{% endblock %}
                    </p>
                </div>

                <div class="bg-white/10 backdrop-blur-sm border border-white/10 p-6 rounded-2xl">
                    {% block primary_action %}
                        {% endblock %}
                </div>
            </div>
        </div>
    </div>

    <div class="container mx-auto px-6 -mt-12 relative z-20 pb-20">
        <div class="bg-white rounded-2xl shadow-xl border border-slate-100 overflow-hidden">
            <div class="p-8 md:p-12">
                {% block detail_content %}
                    {% endblock %}
            </div>
        </div>
    </div>
{% endblock %}
